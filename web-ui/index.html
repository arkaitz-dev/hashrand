<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HashRand - Random Hash Generator</title>
    <link rel="stylesheet" href="/src/css/main.css">
</head>
<body class="min-h-screen p-5 transition-colors duration-300">
    <!-- Preloader -->
    <div id="preloader" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999;">
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center;">
            <div id="progress-percent">0%</div>
            <div id="progress-container" style="width: 200px; height: 4px; margin-top: 10px;">
                <div id="progress-bar" style="width: 0%; height: 100%; transition: width 0.1s ease;"></div>
            </div>
        </div>
    </div>

    <!-- Main application (hidden initially) -->
    <div id="main-app" style="visibility: hidden;">
        <div class="max-w-4xl mx-auto bg-white dark:bg-black rounded-lg shadow-lg dark:shadow-black/30 overflow-hidden transition-colors duration-300">
            <div class="bg-blue-600 dark:bg-gray-700 text-white px-6 py-1 flex md:grid md:grid-cols-3 items-center justify-between md:justify-items-center transition-colors duration-300 border-b border-blue-700 dark:border-gray-500">
                <div class="md:col-start-2">
                    <header-title></header-title>
                </div>
                <div class="md:col-start-3 md:justify-self-end">
                    <config-view-mode></config-view-mode>
                </div>
            </div>
            
            <div class="p-8 bg-gray-50 dark:bg-gray-500 dark:text-gray-100 transition-colors duration-300">
                <div id="router-outlet"></div>
            </div>
        </div>
    </div>
    
    <!-- Inline preloader script (not bundled) -->
    <script>
        (function() {
            const preloader = document.getElementById('preloader');
            const mainApp = document.getElementById('main-app');
            const progressPercent = document.getElementById('progress-percent');
            const progressBar = document.getElementById('progress-bar');
            const progressContainer = document.getElementById('progress-container');
            
            // Detect system color scheme and apply styles
            const savedTheme = localStorage.getItem('hashrand-theme');
            const isDarkMode = savedTheme ? savedTheme === 'dark' : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
            
            // Apply theme to HTML immediately to prevent flash
            if (isDarkMode) {
                document.documentElement.classList.add('dark');
                document.body.style.backgroundColor = '#1f2937'; // gray-800 - SAME as preloader
            } else {
                document.documentElement.classList.remove('dark');
                document.body.style.backgroundColor = '#f9fafb'; // gray-50
            }
            
            if (isDarkMode) {
                // Dark mode styles - matching main app dark theme
                preloader.style.background = '#1f2937'; // Gray-800
                progressPercent.style.color = '#f3f4f6'; // Gray-100
                progressContainer.style.border = '1px solid #4b5563'; // Gray-600
                progressBar.style.backgroundColor = '#3b82f6'; // Blue-500
            } else {
                // Light mode styles - matching main app light theme
                preloader.style.background = '#ffffff';
                progressPercent.style.color = '#1f2937'; // Gray-800
                progressContainer.style.border = '1px solid #e5e7eb'; // Gray-200
                progressBar.style.backgroundColor = '#3b82f6'; // Blue-500
            }
            
            let totalProgress = 0;
            let assetsCompleted = 0;
            const assetWeights = new Map();
            let totalAssets = 0;
            
            function updateProgress() {
                const progress = Math.min(Math.round(totalProgress), 100);
                progressPercent.textContent = `${progress}%`;
                progressBar.style.width = `${progress}%`;
                
                if (progress >= 100) {
                    preloader.remove();
                    mainApp.style.visibility = 'visible';
                }
            }
            
            // Download with progress tracking
            async function trackAssetDownload(url, weight = 1) {
                try {
                    const response = await fetch(url);
                    const contentLength = response.headers.get('content-length');
                    
                    if (!contentLength) {
                        // No content-length header, treat as instant
                        totalProgress += weight * 100 / totalAssets;
                        updateProgress();
                        return;
                    }
                    
                    const total = parseInt(contentLength);
                    let loaded = 0;
                    
                    const reader = response.body.getReader();
                    
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        
                        loaded += value.length;
                        const assetProgress = (loaded / total) * 100;
                        
                        // Update total progress
                        const prevProgress = assetWeights.get(url) || 0;
                        const newProgress = assetProgress * weight / totalAssets;
                        totalProgress = totalProgress - prevProgress + newProgress;
                        assetWeights.set(url, newProgress);
                        
                        updateProgress();
                    }
                } catch (error) {
                    // On error, mark as complete
                    totalProgress += weight * 100 / totalAssets;
                    updateProgress();
                }
            }
            
            // Collect assets to track
            const assetsToTrack = [];
            
            document.querySelectorAll('link[rel="stylesheet"]').forEach(link => {
                if (link.href) {
                    assetsToTrack.push({ url: link.href, weight: 1 });
                }
            });
            
            document.querySelectorAll('script[type="module"]').forEach(script => {
                if (script.src) {
                    assetsToTrack.push({ url: script.src, weight: 3 }); // JS files are typically larger
                }
            });
            
            totalAssets = assetsToTrack.reduce((sum, asset) => sum + asset.weight, 0);
            
            if (totalAssets === 0) {
                preloader.remove();
                return;
            }
            
            // Start tracking all assets
            assetsToTrack.forEach(asset => {
                trackAssetDownload(asset.url, asset.weight);
            });
            
            // Fallback: hide preloader after maximum time
            setTimeout(() => {
                if (preloader.parentNode) {
                    preloader.remove();
                    mainApp.style.visibility = 'visible';
                }
            }, 10000);
            
            updateProgress();
        })();
    </script>
    
    <script type="module" src="/src/index.js"></script>
</body>
</html>
