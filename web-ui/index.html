<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HashRand - Random Hash Generator</title>
    <link rel="stylesheet" href="/src/css/main.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-500 to-purple-600 p-5">
    <!-- Preloader -->
    <div id="preloader" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999;">
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center;">
            <div id="progress-percent">0%</div>
            <div id="progress-container" style="width: 200px; height: 4px; margin-top: 10px;">
                <div id="progress-bar" style="width: 0%; height: 100%; transition: width 0.1s ease;"></div>
            </div>
        </div>
    </div>

    <!-- Main application (hidden initially) -->
    <div id="main-app" style="visibility: hidden;">
        <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-2xl overflow-hidden">
            <div class="bg-slate-700 text-white p-8 text-center relative">
                <language-selector class="absolute top-6 right-6 z-50"></language-selector>
                <header-title></header-title>
            </div>
            
            <div class="p-8">
                <div id="router-outlet"></div>
            </div>
        </div>
    </div>
    
    <!-- Inline preloader script (not bundled) -->
    <script>
        (function() {
            const preloader = document.getElementById('preloader');
            const mainApp = document.getElementById('main-app');
            const progressPercent = document.getElementById('progress-percent');
            const progressBar = document.getElementById('progress-bar');
            const progressContainer = document.getElementById('progress-container');
            
            // Detect system color scheme and apply styles
            const isDarkMode = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            if (isDarkMode) {
                // Dark mode styles
                preloader.style.background = '#2d3748'; // Gray-700
                progressPercent.style.color = '#e2e8f0'; // Gray-300
                progressContainer.style.border = '1px solid #4a5568'; // Gray-600
                progressBar.style.backgroundColor = '#63b3ed'; // Blue-400
            } else {
                // Light mode styles (default)
                preloader.style.background = 'white';
                progressPercent.style.color = 'black';
                progressContainer.style.border = '1px solid #ccc';
                progressBar.style.backgroundColor = '#4285f4';
            }
            
            let totalProgress = 0;
            let assetsCompleted = 0;
            const assetWeights = new Map();
            let totalAssets = 0;
            
            function updateProgress() {
                const progress = Math.min(Math.round(totalProgress), 100);
                progressPercent.textContent = `${progress}%`;
                progressBar.style.width = `${progress}%`;
                
                if (progress >= 100) {
                    preloader.remove();
                    mainApp.style.visibility = 'visible';
                }
            }
            
            // Download with progress tracking
            async function trackAssetDownload(url, weight = 1) {
                try {
                    const response = await fetch(url);
                    const contentLength = response.headers.get('content-length');
                    
                    if (!contentLength) {
                        // No content-length header, treat as instant
                        totalProgress += weight * 100 / totalAssets;
                        updateProgress();
                        return;
                    }
                    
                    const total = parseInt(contentLength);
                    let loaded = 0;
                    
                    const reader = response.body.getReader();
                    
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        
                        loaded += value.length;
                        const assetProgress = (loaded / total) * 100;
                        
                        // Update total progress
                        const prevProgress = assetWeights.get(url) || 0;
                        const newProgress = assetProgress * weight / totalAssets;
                        totalProgress = totalProgress - prevProgress + newProgress;
                        assetWeights.set(url, newProgress);
                        
                        updateProgress();
                    }
                } catch (error) {
                    // On error, mark as complete
                    totalProgress += weight * 100 / totalAssets;
                    updateProgress();
                }
            }
            
            // Collect assets to track
            const assetsToTrack = [];
            
            document.querySelectorAll('link[rel="stylesheet"]').forEach(link => {
                if (link.href) {
                    assetsToTrack.push({ url: link.href, weight: 1 });
                }
            });
            
            document.querySelectorAll('script[type="module"]').forEach(script => {
                if (script.src) {
                    assetsToTrack.push({ url: script.src, weight: 3 }); // JS files are typically larger
                }
            });
            
            totalAssets = assetsToTrack.reduce((sum, asset) => sum + asset.weight, 0);
            
            if (totalAssets === 0) {
                preloader.remove();
                return;
            }
            
            // Start tracking all assets
            assetsToTrack.forEach(asset => {
                trackAssetDownload(asset.url, asset.weight);
            });
            
            // Fallback: hide preloader after maximum time
            setTimeout(() => {
                if (preloader.parentNode) {
                    preloader.remove();
                    mainApp.style.visibility = 'visible';
                }
            }, 10000);
            
            updateProgress();
        })();
    </script>
    
    <script type="module" src="/src/index.js"></script>
</body>
</html>
